version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tuyensinh-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: tuyensinh
      DB_USERNAME: tuyensinh
      DB_PASSWORD: tuyensinh2026
    depends_on:
      - db

  web:
    image: nginx:stable-alpine
    container_name: tuyensinh-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: tuyensinh-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tuyensinhcrm
      MYSQL_USER: tuyensinhcrm
      MYSQL_PASSWORD: tuyensinh
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  node:
    image: node:20-alpine
    container_name: tuyensinh-node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - app

volumes:
  db_data:

